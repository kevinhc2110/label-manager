services:
  db:
    build: ./db
    container_name: label-manager-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${postgres_user}
      POSTGRES_PASSWORD: ${postgres_password}
      POSTGRES_DB: ${postgres_db}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${postgres_user} -d ${postgres_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: label-manager-app
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    env_file: .env

    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  demo:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_API_URL: /api
    container_name: label-manager-frontend
    restart: unless-stopped

    ports:
      - "5173:80"

    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
